# CLI tool, only in development environment.
# https://goframe.org/docs/cli
gfcli:
  gen:
    # gf gen service 单次仅支持一组 srcFolder/dstFolder；多子包请用 hack.mk 的 `make service`（两次 gen）。
    # 勿对 security 跑 gen：logic/security 无 s* 结构体会生成空 ISecurity 并覆盖手工文件。
    # 勿用 `gf gen service -a` 当作「全量」：-a 是 stPattern（结构体名正则），会按默认 dst 生成根目录 package service 文件。

    dao:
      - link: "mysql:admin:Kvma2NlDaxtEBNH64od4@tcp(wohui-staging.cluster-cv3j8xtjauo3.ap-southeast-1.rds.amazonaws.com:3306)/hsk_exam"
        descriptionTag: true
        jsonCase: "Snake"
        #tables: "sys_*"
        #doPath: "model/do/sys"
        #daoPath: "dao/sys"
        #entityPath: "model/entity/sys"
        # tables: "mock_*"
        # doPath: "model/do/mock"
        # daoPath: "dao/mock"
        # entityPath: "model/entity/mock"
        tables: "exam_*"
        doPath: "model/do/exam"
        daoPath: "dao/exam"
        entityPath: "model/entity/exam"

  docker:
    build: "-a amd64 -s linux -p temp -ew"
    tagPrefixes:
      - my.image.pub/my-app
